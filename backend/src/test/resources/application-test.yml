spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

webjuggler:
  upload:
    path: ./test-uploads
    max-size-mb: 10
  cache:
    max-size-mb: 64
  jwt:
    secret: change-this-in-production-to-a-secure-random-key-at-least-256-bits
    expiration-hours: 24
  browse:
    allowed-paths: []
